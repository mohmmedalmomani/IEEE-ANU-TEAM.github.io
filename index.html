<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEEE ANU | Speed Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #010a14, #021e2a);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease;
        }
        .ieee-card {
            text-align: center;
            background: rgba(0, 30, 45, 0.6);
            padding: 3rem 4rem;
            border-radius: 4rem;
            backdrop-filter: blur(16px);
            border: 2px solid cyan;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px cyan; }
            to { box-shadow: 0 0 40px cyan; }
        }
        .ieee-text { font-size: 3rem; font-weight: 900; color: cyan; }
        .start-quiz-btn {
            background: cyan;
            border: none;
            font-size: 1.7rem;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 2rem;
            font-weight: bold;
        }
        .quiz-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
            display: none;
        }
        .timer-box {
            background: #000000aa;
            display: inline-block;
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            font-size: 2rem;
            color: cyan;
            font-family: monospace;
        }
        .question-text {
            background: rgba(0, 15, 25, 0.7);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1rem 0;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .option-card {
            background: rgba(15, 40, 55, 0.85);
            border-radius: 2rem;
            padding: 1rem;
            cursor: pointer;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .option-card:hover { background: #0e6b5e; }
        .option-card.correct-highlight { background: #0f7b3a; }
        .option-card.wrong-highlight { background: #ac2f3a; }
        .next-btn {
            background: cyan;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .result-card {
            text-align: center;
            padding: 1rem;
        }
        .name-input-area {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .name-input-area input {
            padding: 0.8rem;
            border-radius: 60px;
            border: none;
            width: 250px;
            text-align: center;
        }
        .save-btn {
            background: cyan;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .team-message {
            text-align: center;
            margin-top: 1rem;
            color: cyan;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
        }
        @media (max-width: 600px) { .ieee-card { padding: 2rem; } .ieee-text { font-size: 2rem; } }
    </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
    <div class="ieee-card">
        <div class="ieee-text"><i class="fas fa-microchip"></i> IEEE ANU</div>
        <div class="sub-ieee" style="color:white; margin-top:1rem;">Global Speed Challenge</div>
        <div style="color:#aaffdd; margin:0.5rem;">Mohammed Almomani</div>
        <button class="start-quiz-btn" id="startBtn"><i class="fas fa-play"></i> Start Challenge</button>
    </div>
</div>

<div class="quiz-container" id="quizApp">
    <h1 style="text-align:center;">Speed Knowledge Race</h1>
    <div style="text-align:center;">
        <div class="timer-box"><i class="fas fa-hourglass-half"></i> <span id="totalTimerDisplay">00:00</span></div>
    </div>
    <div class="stats-bar">
        <span>Question <span id="currentQNumber">1</span>/10</span>
        <span>Score: <span id="scoreValue">0</span>/10</span>
    </div>
    <div class="question-text" id="questionText">Loading...</div>
    <div class="options-grid" id="optionsContainer"></div>
    <button class="next-btn" id="nextButton">Next Question</button>
    <div class="team-message">– Proudly | Mohammed Almomani | IEEE ANU</div>
</div>

<script>
    const QUESTIONS = [
        { text: "Correct syntax for variable in C++?", options: ["int = x 5;", "int x = 5;", "x int = 5;", "5 = int x;"], correct: 1 },
        { text: "Difference between compiled and interpreted languages?", options: ["No difference", "Compiler executes directly", "Compiler converts to machine language", "Interpreter is always faster"], correct: 2 },
        { text: "Example of interpreted language?", options: ["C++", "Java", "Python", "C"], correct: 2 },
        { text: "Valid loop in C++?", options: ["for i = 0 to 10", "for (int i = 0; i < 10; i++)", "for i in range(10)", "loop (i < 10)"], correct: 1 },
        { text: "Type of malware?", options: ["Firewall", "Antivirus", "Trojan", "VPN"], correct: 2 },
        { text: "What is phishing?", options: ["Internal network attack", "Trick user for sensitive info", "Internet acceleration", "Data encryption"], correct: 1 },
        { text: "What is 2FA?", options: ["Two passwords", "Two verification methods", "Delete account", "Change password"], correct: 1 },
        { text: "Function of AI model?", options: ["Display images", "Learn from data to predict", "Store data", "Run device"], correct: 1 },
        { text: "What is NLP?", options: ["Image processing", "Understand human language", "Network analysis", "Game design"], correct: 1 },
        { text: "What is AI?", options: ["Web design", "Mimic human intelligence", "Internet acceleration", "Data storage"], correct: 1 }
    ];

    // ⚠️ ضع رابط Google Sheets هنا (بدون Apps Script)
    // مثال: https://docs.google.com/forms/d/e/.../viewform
    // الطريقة: استخدم Google Forms بدلاً من ذلك
    
    // بما أن Google Sheets لا تقبل الإرسال المباشر بدون Apps Script،
    // سأستخدم Local Storage مؤقتاً لحين حل المشكلة
    
    let currentIndex = 0, userAnswers = new Array(10).fill(null), score = 0, quizLocked = false;
    let quizStartTime = null, timerInterval = null, quizCompleted = false;
    let finalElapsedSeconds = 0;

    function updateTimerDisplay() {
        if (!quizStartTime || quizCompleted) return;
        const elapsed = (Date.now() - quizStartTime) / 1000;
        const minutes = Math.floor(elapsed / 60);
        const seconds = Math.floor(elapsed % 60);
        document.getElementById("totalTimerDisplay").innerText = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function startGlobalTimer() {
        if (timerInterval) clearInterval(timerInterval);
        quizStartTime = Date.now();
        timerInterval = setInterval(() => { if (!quizCompleted) updateTimerDisplay(); }, 200);
    }

    function computeScore() {
        let newScore = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) newScore++;
        }
        score = newScore;
        document.getElementById("scoreValue").innerText = score;
        return score;
    }

    function showMessage(msg, bgColor) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:${bgColor}; padding:10px 20px; border-radius:30px; z-index:9999; color:white;`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function loadQuestion() {
        quizLocked = false;
        const q = QUESTIONS[currentIndex];
        document.getElementById("questionText").innerText = q.text;
        let html = "";
        ["A", "B", "C", "D"].forEach((prefix, idx) => {
            html += `<div class="option-card" data-opt-index="${idx}"><strong>${prefix}</strong> ${q.options[idx]}</div>`;
        });
        document.getElementById("optionsContainer").innerHTML = html;
        document.querySelectorAll(".option-card").forEach(div => {
            div.addEventListener("click", () => {
                if (quizLocked) return;
                const chosen = parseInt(div.dataset.optIndex);
                if (userAnswers[currentIndex] !== null) return;
                const isCorrect = (chosen === q.correct);
                userAnswers[currentIndex] = chosen;
                computeScore();
                if (isCorrect) div.classList.add("correct-highlight");
                else div.classList.add("wrong-highlight");
                quizLocked = true;
                showMessage(isCorrect ? "✅ Correct!" : `❌ Wrong! Correct: ${q.options[q.correct]}`, isCorrect ? "#24a85c" : "#d94f4f");
            });
        });
        document.getElementById("currentQNumber").innerText = currentIndex + 1;
        document.getElementById("nextButton").innerHTML = (currentIndex === 9) ? "Finish Test" : "Next Question";
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function saveResult() {
        finalElapsedSeconds = getTotalElapsedSeconds();
        if (timerInterval) clearInterval(timerInterval);
        quizCompleted = true;
        const finalScore = computeScore();
        
        document.querySelector(".stats-bar").style.display = "none";
        document.querySelector(".question-text").style.display = "none";
        document.querySelector(".options-grid").style.display = "none";
        document.getElementById("nextButton").style.display = "none";
        
        const resultDiv = document.createElement("div");
        resultDiv.className = "result-card";
        resultDiv.innerHTML = `
            <h2>Final Result</h2>
            <div style="font-size:2rem; font-weight:800; background:cyan; display:inline-block; padding:0.2rem 1.5rem; border-radius:60px;">${finalScore} / 10</div>
            <p style="font-size:1.2rem; margin:1rem 0;">⏱️ Total Time: ${formatTime(finalElapsedSeconds)}</p>
            <div class="name-input-area">
                <input type="text" id="participantName" placeholder="Enter your name">
                <button class="save-btn" id="saveResultBtn">Save Result</button>
            </div>
            <div class="team-message">– Proudly | Mohammed Almomani | IEEE ANU</div>
        `;
        document.getElementById("quizApp").appendChild(resultDiv);
        
        document.getElementById("saveResultBtn")?.addEventListener("click", () => {
            const name = document.getElementById("participantName").value.trim();
            if (name === "") { showMessage("Please enter your name", "#ffaa66"); return; }
            const participants = JSON.parse(localStorage.getItem("quizParticipants") || "[]");
            participants.push({ name: name, time: finalElapsedSeconds, score: finalScore, date: new Date().toISOString() });
            localStorage.setItem("quizParticipants", JSON.stringify(participants));
            showMessage("Result saved! Check leaderboard.", "#24a85c");
            setTimeout(() => { window.location.href = "leaderboard.html"; }, 1500);
        });
    }

    function handleNext() {
        if (userAnswers[currentIndex] === null) { showMessage("Please select an answer!", "#ffad86"); return; }
        if (currentIndex === 9) saveResult();
        else { currentIndex++; loadQuestion(); }
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers = new Array(10).fill(null);
        score = 0;
        quizLocked = false;
        quizCompleted = false;
        computeScore();
        loadQuestion();
        startGlobalTimer();
    }

    document.getElementById("startBtn").addEventListener("click", () => {
        document.getElementById("splashScreen").style.opacity = "0";
        setTimeout(() => { document.getElementById("splashScreen").style.display = "none"; }, 800);
        document.querySelector(".quiz-container").style.display = "block";
        resetQuiz();
    });
    document.getElementById("nextButton").addEventListener("click", handleNext);
</script>
</body>
</html>
