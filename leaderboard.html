<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتصدرين - الفائز بجائزة أسرع مشارك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #0ff, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .winner-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #02212e;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px gold; }
            to { box-shadow: 0 0 30px gold; }
        }
        .winner-name {
            font-size: 2rem;
            font-weight: 800;
        }
        .winner-time {
            font-size: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }
        th {
            background: #0ff22a;
            color: #02212e;
        }
        .rank-1 { background: rgba(255,215,0,0.2); font-weight: bold; }
        .rank-2 { background: rgba(192,192,192,0.2); }
        .rank-3 { background: rgba(205,127,50,0.2); }
        .btn-back {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            background: #0ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #02161f;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            transform: scale(1.05);
            background: #2af;
        }
        .empty-msg {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #8bcbdd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-trophy"></i> قائمة المتصدرين <i class="fas fa-clock"></i></h1>
    <div id="winnerArea"></div>
    <h2><i class="fas fa-users"></i> جميع المشاركين</h2>
    <div id="leaderboardTable"></div>
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للاختبار</a>
    <footer>أقل وقت يفوز بالجائزة الكبرى | Mohammed Almomani - IEEE ANU</footer>
</div>

<script>
    function loadLeaderboard() {
        const participants = JSON.parse(localStorage.getItem("quizParticipants") || "[]");
        const sorted = [...participants].sort((a,b) => a.time - b.time);
        const winner = sorted[0];
        const winnerArea = document.getElementById("winnerArea");
        if (winner) {
            winnerArea.innerHTML = `
                <div class="winner-card">
                    <i class="fas fa-crown" style="font-size:3rem;"></i>
                    <div class="winner-name">🏆 الفائز: ${escapeHtml(winner.name)} 🏆</div>
                    <div class="winner-time">⏱️ الزمن: ${formatTime(winner.time)}</div>
                    <div style="margin-top:1rem;">🎁 يحصل على جائزة: شهادة تقدير + قسيمة خصم 50% 🎁</div>
                </div>
            `;
        } else {
            winnerArea.innerHTML = `<div class="empty-msg">لا يوجد مشاركون حتى الآن. كن أول من يشارك!</div>`;
        }

        let tableHtml = `<table><tr><th>#</th><th>الاسم</th><th>الزمن</th><th>النقاط</th></tr>`;
        if (sorted.length === 0) {
            tableHtml += `<tr><td colspan="4" style="text-align:center;">لا توجد بيانات</td></tr>`;
        } else {
            sorted.forEach((p, idx) => {
                let rankClass = "";
                if (idx === 0) rankClass = "rank-1";
                else if (idx === 1) rankClass = "rank-2";
                else if (idx === 2) rankClass = "rank-3";
                tableHtml += `<tr class="${rankClass}"><td>${idx+1}</td><td>${escapeHtml(p.name)}</td><td>${formatTime(p.time)}</td><td>${p.score}/10</td></tr>`;
            });
        }
        tableHtml += `abel`;
        document.getElementById("leaderboardTable").innerHTML = tableHtml;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadLeaderboard();
</script>
</body>
</html>
