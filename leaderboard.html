<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتصدرين - IEEE ANU</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
        }
        h1 { text-align: center; color: cyan; margin-bottom: 1rem; }
        .login-box { text-align: center; padding: 2rem; }
        .login-box input {
            padding: 0.8rem;
            border-radius: 60px;
            border: none;
            width: 250px;
            text-align: center;
            margin: 1rem;
            background: #022b36;
            color: white;
        }
        .login-btn {
            background: cyan;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .winner-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #02212e;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px gold; }
            to { box-shadow: 0 0 30px gold; }
        }
        .winner-name { font-size: 2rem; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.8rem; text-align: center; border-bottom: 1px solid rgba(0,255,255,0.3); }
        th { background: cyan; color: #02212e; }
        .rank-1 { background: rgba(255,215,0,0.2); font-weight: bold; }
        .btn-back {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            background: cyan;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #02161f;
            font-weight: bold;
        }
        .clear-btn {
            background: #ff4444;
            border: none;
            padding: 10px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
        }
        .error-msg { color: #ff8888; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection">
        <div class="login-box">
            <h1><i class="fas fa-lock"></i> لوحة التحكم</h1>
            <input type="password" id="passwordInput" placeholder="كلمة السر">
            <br>
            <button class="login-btn" id="loginBtn">دخول</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <div id="leaderboardContent" style="display: none;">
        <h1><i class="fas fa-trophy"></i> قائمة المتصدرين</h1>
        <div id="winnerArea"></div>
        <button id="clearDataBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> مسح جميع المحاولات</button>
        <h2>جميع المشاركين</h2>
        <div id="leaderboardTable"></div>
        <a href="index.html" class="btn-back">العودة للاختبار</a>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin2025";

    function loadLeaderboard() {
        const participants = JSON.parse(localStorage.getItem("quizParticipants") || "[]");
        const sorted = [...participants].sort((a,b) => a.time - b.time);
        const winner = sorted[0];
        const winnerArea = document.getElementById("winnerArea");
        
        if (winner) {
            winnerArea.innerHTML = `
                <div class="winner-card">
                    <i class="fas fa-crown" style="font-size:3rem;"></i>
                    <div class="winner-name">🏆 الفائز: ${winner.name} 🏆</div>
                    <div style="font-size:1.5rem;">⏱️ الزمن: ${formatTime(winner.time)}</div>
                    <div style="margin-top:1rem;">🎁 جائزة: شهادة تقدير + قسيمة خصم 50% 🎁</div>
                </div>
            `;
        } else {
            winnerArea.innerHTML = `<div style="text-align:center; padding:2rem;">لا يوجد مشاركون بعد</div>`;
        }

        let tableHtml = `<table><th>#</th><th>الاسم</th><th>الزمن</th><th>النقاط</th></tr>`;
        sorted.forEach((p, idx) => {
            tableHtml += `<tr class="${idx === 0 ? 'rank-1' : ''}">
                <td>${idx+1}</td>
                <td>${p.name}</td>
                <td>${formatTime(p.time)}</td>
                <td>${p.score}/10</td>
            </tr>`;
        });
        tableHtml += `闭台`;
        document.getElementById("leaderboardTable").innerHTML = tableHtml || "<div style='text-align:center;padding:2rem;'>لا توجد بيانات</div>";
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    document.getElementById("loginBtn").addEventListener("click", () => {
        const password = document.getElementById("passwordInput").value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("leaderboardContent").style.display = "block";
            loadLeaderboard();
        } else {
            document.getElementById("errorMsg").innerHTML = "كلمة السر غير صحيحة!";
        }
    });

    document.getElementById("clearDataBtn")?.addEventListener("click", () => {
        if(confirm("سيتم حذف جميع المحاولات! هل أنت متأكد؟")) {
            localStorage.removeItem("quizParticipants");
            alert("تم مسح جميع البيانات!");
            location.reload();
        }
    });
</script>
</body>
</html>
