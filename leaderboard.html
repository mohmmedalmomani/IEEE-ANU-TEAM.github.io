<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - المتصدرين (خاص)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #0ff, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .login-box {
            text-align: center;
            padding: 2rem;
        }
        .login-box input {
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: none;
            font-family: 'Tajawal';
            font-size: 1rem;
            width: 250px;
            text-align: center;
            margin: 1rem;
            background: #022b36;
            color: white;
        }
        .login-btn {
            background: #0ff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .winner-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #02212e;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px gold; }
            to { box-shadow: 0 0 30px gold; }
        }
        .winner-name {
            font-size: 2rem;
            font-weight: 800;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }
        th {
            background: #0ff;
            color: #02212e;
        }
        .rank-1 { background: rgba(255,215,0,0.2); font-weight: bold; }
        .btn-back {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            background: #0ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #02161f;
            font-weight: bold;
            text-align: center;
        }
        .error-msg {
            color: #ff8888;
            text-align: center;
            margin-top: 1rem;
        }
        .loading-msg {
            text-align: center;
            padding: 2rem;
            color: cyan;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #8bcbdd;
        }
        .clear-btn {
            background: #ff4444;
            border: none;
            padding: 10px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Tajawal';
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            transition: 0.3s;
            margin: 15px 0;
        }
        .clear-btn:hover {
            transform: scale(1.02);
            background: #ff0000;
            box-shadow: 0 0 20px red;
        }
        .refresh-btn {
            background: #00aaff;
            border: none;
            padding: 10px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Tajawal';
            margin: 15px 10px;
        }
        .live-badge {
            background: #00ff00;
            color: #02212e;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div id="loginSection">
        <div class="login-box">
            <h1><i class="fas fa-lock"></i> لوحة التحكم - خاصة</h1>
            <p style="margin-bottom: 1rem;">هذه الصفحة مخصصة للمسؤول فقط</p>
            <input type="password" id="passwordInput" placeholder="أدخل كلمة السر">
            <br>
            <button class="login-btn" id="loginBtn"><i class="fas fa-unlock-alt"></i> دخول</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <div id="leaderboardContent" style="display: none;">
        <h1><i class="fas fa-trophy"></i> قائمة المتصدرين <span class="live-badge"><i class="fas fa-circle" style="font-size:0.6rem;"></i> مباشر</span></h1>
        <div id="winnerArea">
            <div class="loading-msg">جاري تحميل البيانات...</div>
        </div>
        
        <div style="text-align: center; margin: 20px 0;">
            <button id="refreshDataBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> تحديث البيانات</button>
            <button id="clearDataBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> مسح جميع المحاولات</button>
        </div>

        <h2><i class="fas fa-users"></i> جميع المشاركين</h2>
        <div id="leaderboardTable"></div>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للاختبار</a>
        <footer>أقل وقت يفوز بالجائزة الكبرى | Mohammed Almomani - IEEE ANU</footer>
    </div>
</div>

<script>
    // 🔥 Firebase Configuration - نفس الإعدادات من index.html 🔥
    const firebaseConfig = {
        apiKey: "AIzaSyAWnexx5GRlVYyBrjuCM6RZRwxLQ4xOY-U",          // اكتب الـ API Key من Firebase Console
        authDomain: "leee-arnu-quiz.firebaseapp.com",
        projectId: "leee-arnu-quiz",
        storageBucket: "leee-arnu-quiz.firebasestorage.app",
        messagingSenderId: "418080244828",
        appId: "1:418080244828:web:8b32a697340ba1c03751340"
    };
    
    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const ADMIN_PASSWORD = "admin2025";
    let unsubscribe = null;  // للاستماع المباشر للتحديثات

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function displayLeaderboard(participants) {
        const winnerArea = document.getElementById("winnerArea");
        const leaderboardTable = document.getElementById("leaderboardTable");
        
        if (participants.length === 0) {
            winnerArea.innerHTML = `<div class="empty-msg" style="text-align:center; padding:2rem;">📭 لا يوجد مشاركون حتى الآن. كن أول من يشارك!</div>`;
            leaderboardTable.innerHTML = `<div class="empty-msg" style="text-align:center; padding:2rem;">لا توجد بيانات لعرضها</div>`;
            return;
        }
        
        const winner = participants[0];
        winnerArea.innerHTML = `
            <div class="winner-card">
                <i class="fas fa-crown" style="font-size:3rem;"></i>
                <div class="winner-name">🏆 الفائز: ${escapeHtml(winner.name)} 🏆</div>
                <div class="winner-time" style="font-size:1.5rem;">⏱️ الزمن: ${formatTime(winner.time)}</div>
                <div style="margin-top:0.5rem;">⭐ النقاط: ${winner.score}/10 ⭐</div>
                <div style="margin-top:1rem;">🎁 يحصل على جائزة: شهادة تقدير + قسيمة خصم 50% 🎁</div>
            </div>
        `;
        
        let tableHtml = `<table><th>#</th><th>الاسم</th><th>الزمن</th><th>النقاط</th>`;
        participants.forEach((p, idx) => {
            let rankClass = (idx === 0) ? "rank-1" : "";
            tableHtml += `<tr class="${rankClass}">
                <td>${idx + 1}</td>
                <td>${escapeHtml(p.name)}</td>
                <td>${formatTime(p.time)}</td>
                <td>${p.score}/10</td>
            </tr>`;
        });
        tableHtml += `闭台`;
        leaderboardTable.innerHTML = tableHtml;
    }

    // الاستماع المباشر للبيانات من Firebase (تحديث تلقائي)
    function startRealtimeListener() {
        if (unsubscribe) unsubscribe();
        
        unsubscribe = db.collection("quiz_results")
            .orderBy("time", "asc")  // ترتيب حسب الوقت (الأسرع أولاً)
            .onSnapshot((snapshot) => {
                const participants = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.name && data.time !== undefined) {
                        participants.push({
                            name: data.name,
                            time: data.time,
                            score: data.score || 0
                        });
                    }
                });
                displayLeaderboard(participants);
            }, (error) => {
                console.error("Firebase error:", error);
                document.getElementById("winnerArea").innerHTML = "<div style='text-align:center;padding:2rem;color:#ff8888;'>❌ خطأ في الاتصال بقاعدة البيانات</div>";
            });
    }

    // مسح جميع البيانات من Firebase
    async function clearAllData() {
        if(confirm("⚠️ تحذير: سيتم حذف جميع المحاولات السابقة نهائياً. هل أنت متأكد؟")) {
            try {
                const snapshot = await db.collection("quiz_results").get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                alert("✅ تم مسح جميع البيانات بنجاح!");
            } catch(e) {
                console.error("Error clearing data:", e);
                alert("❌ حدث خطأ أثناء محاولة مسح البيانات");
            }
        }
    }

    // زر تسجيل الدخول
    document.getElementById("loginBtn").addEventListener("click", function() {
        const password = document.getElementById("passwordInput").value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("leaderboardContent").style.display = "block";
            startRealtimeListener();  // بدء الاستماع المباشر
        } else {
            document.getElementById("errorMsg").innerHTML = "كلمة السر غير صحيحة! الوصول غير مسموح.";
        }
    });
    
    // زر تحديث البيانات - يعيد الاتصال
    document.getElementById("refreshDataBtn")?.addEventListener("click", function() {
        startRealtimeListener();
    });
    
    // زر مسح البيانات
    document.getElementById("clearDataBtn")?.addEventListener("click", function() {
        clearAllData();
    });
</script>
</body>
</html>
