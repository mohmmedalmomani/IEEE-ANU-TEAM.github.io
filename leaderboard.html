<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - المتصدرين (خاص)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #0ff, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .login-box {
            text-align: center;
            padding: 2rem;
        }
        .login-box input {
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: none;
            font-family: 'Tajawal';
            font-size: 1rem;
            width: 250px;
            text-align: center;
            margin: 1rem;
            background: #022b36;
            color: white;
        }
        .login-btn {
            background: #0ff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .winner-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #02212e;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px gold; }
            to { box-shadow: 0 0 30px gold; }
        }
        .winner-name {
            font-size: 2rem;
            font-weight: 800;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }
        th {
            background: #0ff;
            color: #02212e;
        }
        .rank-1 { background: rgba(255,215,0,0.2); font-weight: bold; }
        .btn-back {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            background: #0ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #02161f;
            font-weight: bold;
            text-align: center;
        }
        .error-msg {
            color: #ff8888;
            text-align: center;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #8bcbdd;
        }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div id="loginSection">
        <div class="login-box">
            <h1><i class="fas fa-lock"></i> لوحة التحكم - خاصة</h1>
            <p style="margin-bottom: 1rem;">هذه الصفحة مخصصة للمسؤول فقط</p>
            <input type="password" id="passwordInput" placeholder="أدخل كلمة السر">
            <br>
            <button class="login-btn" id="loginBtn"><i class="fas fa-unlock-alt"></i> دخول</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <div id="leaderboardContent" style="display: none;">
        <h1><i class="fas fa-trophy"></i> قائمة المتصدرين <i class="fas fa-clock"></i></h1>
        <div id="winnerArea"></div>
<!-- 👇 أضف هذا الزر هنا 👇 -->
<div style="text-align: center; margin: 20px 0;">
    <button id="clearDataBtn" style="background:#ff4444; border:none; padding:10px 25px; border-radius:60px; color:white; font-weight:bold; cursor:pointer; font-family:'Tajawal'; box-shadow:0 0 10px rgba(255,0,0,0.5);">
        <i class="fas fa-trash-alt"></i> مسح جميع المحاولات السابقة
    </button>
</div>


        <h2><i class="fas fa-users"></i> جميع المشاركين</h2>
        <div id="leaderboardTable"></div>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للاختبار</a>
        <footer>أقل وقت يفوز بالجائزة الكبرى | Mohammed Almomani - IEEE ANU</footer>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin2025"; // كلمة المرور - يمكنك تغييرها

    function loadLeaderboard() {
        const participants = JSON.parse(localStorage.getItem("quizParticipants") || "[]");
        const sorted = [...participants].sort((a,b) => a.time - b.time);
        const winner = sorted[0];
        const winnerArea = document.getElementById("winnerArea");
        if (winner) {
            winnerArea.innerHTML = `
                <div class="winner-card">
                    <i class="fas fa-crown" style="font-size:3rem;"></i>
                    <div class="winner-name">🏆 الفائز: ${escapeHtml(winner.name)} 🏆</div>
                    <div class="winner-time" style="font-size:1.5rem;">⏱️ الزمن: ${formatTime(winner.time)}</div>
                    <div style="margin-top:1rem;">🎁 يحصل على جائزة: شهادة تقدير + قسيمة خصم 50% 🎁</div>
                </div>
            `;
        } else {
            winnerArea.innerHTML = `<div class="empty-msg" style="text-align:center; padding:2rem;">لا يوجد مشاركون حتى الآن. كن أول من يشارك!</div>`;
        }

        let tableHtml = `<table><th>#</th><th>الاسم</th><th>الزمن</th><th>النقاط</th></tr>`;
        if (sorted.length === 0) {
            tableHtml += `<tr><td colspan="4" style="text-align:center;">لا توجد بيانات</td></tr>`;
        } else {
            sorted.forEach((p, idx) => {
                let rankClass = "";
                if (idx === 0) rankClass = "rank-1";
                tableHtml += `<tr class="${rankClass}">\n<td>${idx+1}</td>\n<td>${escapeHtml(p.name)}</td>\n<td>${formatTime(p.time)}</td>\n<td>${p.score}/10</td>\n</tr>`;
            });
        }
        tableHtml += `abelle`;
        document.getElementById("leaderboardTable").innerHTML = tableHtml;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById("loginBtn").addEventListener("click", function() {
        const password = document.getElementById("passwordInput").value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("leaderboardContent").style.display = "block";
            loadLeaderboard();
        } else {
            document.getElementById("errorMsg").innerHTML = "كلمة السر غير صحيحة! الوصول غير مسموح.";
        }
    });
    document.getElementById("clearDataBtn")?.addEventListener("click", function() {
    if(confirm("⚠️ تحذير: سيتم حذف جميع المحاولات السابقة نهائياً. هل أنت متأكد؟")) {
        localStorage.removeItem("quizParticipants");
        alert("✅ تم مسح جميع البيانات! سيتم تحديث الصفحة.");
        location.reload();
    }
});
</script>
</body>
</html>
