<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتصدرين - IEEE ANU</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03070f);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid cyan;
        }
        h1 { text-align: center; color: cyan; margin-bottom: 1rem; }
        .login-box { text-align: center; padding: 2rem; }
        .login-box input {
            padding: 0.8rem;
            border-radius: 60px;
            border: none;
            width: 250px;
            text-align: center;
            margin: 1rem;
            background: #022b36;
            color: white;
        }
        .login-btn {
            background: cyan;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .winner-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #02212e;
            animation: glow 1s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px gold; }
            to { box-shadow: 0 0 30px gold; }
        }
        .winner-name { font-size: 2rem; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.8rem; text-align: center; border-bottom: 1px solid rgba(0,255,255,0.3); }
        th { background: cyan; color: #02212e; }
        .rank-1 { background: rgba(255,215,0,0.2); font-weight: bold; }
        .btn-back {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            background: cyan;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            color: #02161f;
            font-weight: bold;
        }
        .refresh-btn {
            background: #00aaff;
            border: none;
            padding: 10px 25px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 10px;
        }
        .error-msg { color: #ff8888; text-align: center; margin-top: 1rem; }
        .loading-msg { text-align: center; padding: 2rem; color: cyan; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection">
        <div class="login-box">
            <h1><i class="fas fa-lock"></i> لوحة التحكم</h1>
            <input type="password" id="passwordInput" placeholder="كلمة السر">
            <br>
            <button class="login-btn" id="loginBtn">دخول</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <div id="leaderboardContent" style="display: none;">
        <h1><i class="fas fa-trophy"></i> قائمة المتصدرين</h1>
        <div id="winnerArea"><div class="loading-msg">جاري تحميل البيانات...</div></div>
        <div style="text-align: center;">
            <button id="refreshDataBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        <h2>جميع المشاركين</h2>
        <div id="leaderboardTable"></div>
        <a href="index.html" class="btn-back">العودة للاختبار</a>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin2025";
    // ⚠️ ضع معرف الورقة هنا (من رابط Google Sheets)
    const SHEET_ID = "YOUR_SHEET_ID_HERE";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

    async function fetchData() {
        try {
            const res = await fetch(CSV_URL + "?t=" + new Date().getTime());
            const csv = await res.text();
            const rows = csv.split("\n").slice(1);
            const participants = [];
            for (let i = 0; i < rows.length; i++) {
                if (rows[i].trim() === "") continue;
                const cols = rows[i].split(",");
                if (cols.length >= 3) {
                    let name = cols[0].replace(/^"|"$/g, '').trim();
                    let time = parseFloat(cols[1]);
                    let score = parseInt(cols[2]) || 0;
                    if (!isNaN(time) && name) participants.push({ name, time, score });
                }
            }
            return participants.sort((a,b) => a.time - b.time);
        } catch(e) { return []; }
    }

    function formatTime(sec) {
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    async function loadLeaderboard() {
        const participants = await fetchData();
        const winnerArea = document.getElementById("winnerArea");
        const tableDiv = document.getElementById("leaderboardTable");
        if (participants.length === 0) {
            winnerArea.innerHTML = "<div style='text-align:center;padding:2rem;'>لا يوجد مشاركون بعد</div>";
            tableDiv.innerHTML = "<div style='text-align:center;padding:2rem;'>لا توجد بيانات</div>";
            return;
        }
        const w = participants[0];
        winnerArea.innerHTML = `<div class="winner-card"><i class="fas fa-crown" style="font-size:3rem;"></i><div class="winner-name">🏆 الفائز: ${w.name} 🏆</div><div>⏱️ الزمن: ${formatTime(w.time)}</div><div>⭐ النقاط: ${w.score}/10 ⭐</div><div style="margin-top:1rem;">🎁 جائزة: شهادة + قسيمة خصم 50% 🎁</div></div>`;
        let html = `<tr><th>#</th><th>الاسم</th><th>الزمن</th><th>النقاط</th>`;
        participants.forEach((p, i) => {
            html += `<tr class="${i===0?'rank-1':''}"><td>${i+1}</td><td>${p.name}</td><td>${formatTime(p.time)}</td><td>${p.score}/10</td></tr>`;
        });
        html += `</table>`;
        tableDiv.innerHTML = html;
    }

    document.getElementById("loginBtn").onclick = () => {
        if (document.getElementById("passwordInput").value === ADMIN_PASSWORD) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("leaderboardContent").style.display = "block";
            loadLeaderboard();
        } else {
            document.getElementById("errorMsg").innerHTML = "كلمة السر غير صحيحة!";
        }
    };
    document.getElementById("refreshDataBtn")?.addEventListener("click", loadLeaderboard);
</script>
</body>
</html>
